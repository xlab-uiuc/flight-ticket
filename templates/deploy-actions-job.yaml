apiVersion: batch/v1
kind: Job
metadata:
  name: deploy-actions
  namespace: openwhisk
spec:
  template:
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: deploy-actions
        image: {{ .Values.jobs.deployActions.image }}
        env:
        - name: WSK_API_HOST
          value: {{ .Values.global.openwhisk.apiHost }}
        - name: WSK_AUTH_KEY
          value: {{ .Values.global.openwhisk.authKey }}
        command: ["/bin/bash", "-c"]
        args:
        - |
          wsk property set --apihost "$WSK_API_HOST" --auth "$WSK_AUTH_KEY" && \
          /app/deploy_ow_actions.sh
      restartPolicy: Never
  backoffLimit: 4
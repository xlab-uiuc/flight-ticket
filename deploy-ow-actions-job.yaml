apiVersion: batch/v1
kind: Job
metadata:
  name: openwhisk-actions-deploy
  namespace: openwhisk
spec:
  template:
    spec:
      containers:
      - name: openwhisk-actions-deploy
        image: jacksonarthurclark/flight-ticket-ow-action-deployer:latest
        env:
        - name: WSK_API_HOST
          value: "https://192.168.49.2:31001"
        - name: WSK_AUTH_KEY
          value: "23bc46b1-71f6-4ed5-8c54-816aa4f8c502:123zO3xZCLrMN6v2BKK1dXYFpXlPkccOFqm12CdAsMgRU4VrNZ9lyGVCGuMDGIwP"
        command: ["/bin/bash", "-c"]
        args:
        - |
          wsk property set --apihost "$WSK_API_HOST" --auth "$WSK_AUTH_KEY" && \
          /app/deploy_ow_actions.sh
      restartPolicy: Never
  backoffLimit: 4